ai_usage_summary: |
  ChatGPT was used for architectural discussions, debugging, code refinement,
  UI improvements, documentation, and presentation preparation. All candidate
  ranking logic, heuristics, implementation decisions, testing, and final
  validation were reviewed and verified before submission. No external LLM or
  API is used during candidate ranking or inference.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  HireFormer is a Transformer-inspired candidate ranking system that generates
  a structured Hiring Blueprint from the Job Description and applies a two-stage
  ranking pipeline. A fast retrieval layer efficiently shortlists the most
  relevant candidates from the complete dataset, followed by Multi-View
  Candidate Evaluation, Evidence Aggregation, and Trust Calibration to produce
  explainable rankings. The system evaluates technical skills, experience,
  recruiter signals, behavioral indicators, and profile quality beyond simple
  keyword matching. The final output is an explainable Top-100 candidate
  shortlist with transparent reasoning for every recommendation while meeting
  the challenge's CPU-only and offline execution constraints.

